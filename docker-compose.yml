# Hermes Command on the VPS, Codex as the brain.
# Set the values in a sibling deploy.env (copy deploy.env.example), or fill them
# into your Hostinger panel's environment fields, then deploy this compose.
services:
  hermes-command:
    build: .
    image: hermes-command:latest
    container_name: hermes-command
    restart: unless-stopped
    ports:
      - "8788:8787"            # host:container — open 8788 on the VPS (change if taken)
    environment:
      # Brain options:
      #  - leave as-is with no key → dashboard runs; agent chat stays offline
      #    until you wire it to your Hermes platform's OAuth brain (see DEPLOY.md).
      #  - set OPENAI_API_KEY → agents run directly on OpenAI/Codex.
      AGENT_BACKEND: ${AGENT_BACKEND:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}     # optional — blank if using the Hermes OAuth brain
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      STATE_FILE: /data/state.json
      # Hermes bridge (OAuth brain): set AGENT_BACKEND=hermes + these three to make
      # the dashboard's chat think via your VPS Hermes platform (no OpenAI key here).
      HERMES_URL: ${HERMES_URL:-}
      HERMES_USERNAME: ${HERMES_USERNAME:-}
      HERMES_PASSWORD: ${HERMES_PASSWORD:-}
      # MCP: secret your Hermes agent presents to call this dashboard's tools.
      MCP_TOKEN: ${MCP_TOKEN:-}
      # Business connectors (optional — leave blank to keep them in simulation):
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      PRINTIFY_API_TOKEN: ${PRINTIFY_API_TOKEN:-}
      ZENDROP_API_KEY: ${ZENDROP_API_KEY:-}
      CJ_API_KEY: ${CJ_API_KEY:-}
      CJ_MCP_TOKEN: ${CJ_MCP_TOKEN:-}
      TIKTOK_SHOP_APP_KEY: ${TIKTOK_SHOP_APP_KEY:-}
      TIKTOK_SHOP_APP_SECRET: ${TIKTOK_SHOP_APP_SECRET:-}
      TIKTOK_SHOP_SERVICE_ID: ${TIKTOK_SHOP_SERVICE_ID:-}
      HIGGSFIELD_API_URL: ${HIGGSFIELD_API_URL:-}
      HIGGSFIELD_CLI_PATH: ${HIGGSFIELD_CLI_PATH:-}
      HIGGSFIELD_IMAGE_MODEL: ${HIGGSFIELD_IMAGE_MODEL:-nano_banana_2}
      HIGGSFIELD_WAIT_TIMEOUT: ${HIGGSFIELD_WAIT_TIMEOUT:-20m}
      HIGGSFIELD_WAIT_INTERVAL: ${HIGGSFIELD_WAIT_INTERVAL:-5s}
      POD_AUTOMATION_ENABLED: ${POD_AUTOMATION_ENABLED:-false}
      POD_AUTOMATION_INTERVAL_DAYS: ${POD_AUTOMATION_INTERVAL_DAYS:-7}
      POD_AUTOMATION_MAX_DESIGNS: ${POD_AUTOMATION_MAX_DESIGNS:-3}
      POD_AUTOPUBLISH: ${POD_AUTOPUBLISH:-false}
    volumes:
      - hermes_data:/data       # persists state.json across rebuilds

volumes:
  hermes_data:
